<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercico - 09 SWITCH</title>
    </head>
    <body>
   <script>
    var conceito =prompt("Digite o conceito:");

    switch (conceito) {
    case "A":

        document.write ("Excelente");
        break;

    case "B":
        document.write ("Ótimo");
        break;

    case "C":
        document.write("Bom");
        break;

    case "D":
        document.write("Regular");
        break;

    case "E":
        document.write("Ruim");
        break;

    case "F":
        document.write("Nós vemos em 2027!");
        break;

    default:
        document.write("Erro: conceito inexistente.");
} </script>

</body>
</html>
