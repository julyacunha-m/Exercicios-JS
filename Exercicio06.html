<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 6 - IF E ELSE</title>
    <script>
        var valoridade = prompt('Digite sua idade:');
        if(valoridade >= 0 && valoridade < 15){
            document.write('Criança');
        }else if(valoridade >= 15 && valoridade < 30){
            document.write('Jovem');    
        }else if(valoridade >= 30 && valoridade < 60){
            document.write('Adulto');   
        }else if(valoridade >= 60 && valoridade < 110){
            document.write('Idoso');
        }else{
            document.write('Ou você não nasceu! Ou tem mais de 100 anos, PARABÉNS! Ou você morreu! Assista o filme O SEXTO SENTIDO!');
        }
    </script>
</head>

</html>
