<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1</title>
</head>
<body>
    <script>
        var nome = prompt('Qual seu nome?');
        var salario = Number(prompt('Qual seu salário?'));
        var vendas = Number(prompt('Quanto vendeu este mês?'));
        var comissao = 0;

        comissao = vendas * 0.025;
        salario = salario + comissao;
         
        document.write('<h1>Olá, ' + nome + ' , seu salário será de ' + salario + ' esse mês!</h1>');

    </script>
</head>
<body> 
</body>

</body>
